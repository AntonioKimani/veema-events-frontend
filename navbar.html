<script>
    // ============================================
    // AFTER DEPLOYMENT, REPLACE WITH YOUR LIVE BACKEND URL
    // ============================================
const BACKEND_URL = 'https://veema-events-backend.railway.app';    
    function updateNavbar() {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        const loginLink = document.getElementById('loginLink');
        const registerLink = document.getElementById('registerLink');
        const logoutLink = document.getElementById('logoutLink');
        const profileLink = document.getElementById('profileLink');
        const ordersLink = document.getElementById('ordersLink');
        const logoutDivider = document.getElementById('logoutDivider');
        const userName = document.getElementById('userName');
        const userAvatar = document.getElementById('userAvatar');
        
        if (token && user && user.name) {
            loginLink.style.display = 'none';
            registerLink.style.display = 'none';
            logoutLink.style.display = 'block';
            profileLink.style.display = 'block';
            ordersLink.style.display = 'block';
            logoutDivider.style.display = 'block';
            
            userName.textContent = user.name.split(' ')[0];
            if (user.avatar) {
                userAvatar.src = user.avatar;
            }
        } else {
            loginLink.style.display = 'block';
            registerLink.style.display = 'block';
            logoutLink.style.display = 'none';
            profileLink.style.display = 'none';
            ordersLink.style.display = 'none';
            logoutDivider.style.display = 'none';
            
            userName.textContent = 'Account';
            userAvatar.src = 'assets/images/default-avatar.png';
        }
    }
    
    document.addEventListener('DOMContentLoaded', updateNavbar);
    
    function handleLogout() {
    const backendUrl = window.ENV?.BACKEND_URL || 'http://localhost:5000';
    fetch(`${backendUrl}/api/auth/logout`, {
        credentials: 'include'
    }).finally(() => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    });
}
</script>
