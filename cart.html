<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Veema Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333333;
        }
        .cart-header {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 40px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid #e0e0e0;
        }
        .cart-item {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            transition: all 0.3s;
        }
        .cart-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .cart-item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-item-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .cart-item-price {
            font-weight: 700;
            color: #000;
            font-size: 1.2rem;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            max-width: 140px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .quantity-btn {
            width: 40px;
            height: 40px;
            background: #f8f9fa;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quantity-btn:hover {
            background: #C6A86A;
            color: white;
        }
        .quantity-input {
            width: 60px;
            height: 40px;
            border: none;
            text-align: center;
            font-weight: 600;
            border-left: 1px solid #e0e0e0;
            border-right: 1px solid #e0e0e0;
            -moz-appearance: textfield;
        }
        .quantity-input::-webkit-outer-spin-button,
        .quantity-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .cart-summary {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #e0e0e0;
            position: sticky;
            top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #e0e0e0;
        }
        .summary-total {
            font-size: 1.3rem;
            font-weight: 700;
            color: #000;
        }
        .checkout-btn {
            background: #333;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .checkout-btn:hover {
            background: #C6A86A;
            color: white;
        }
        .remove-btn {
            color: #dc3545;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }
        .remove-btn:hover {
            color: #a71d2a;
        }
        .empty-cart {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        .continue-shopping {
            color: #666;
            text-decoration: none;
        }
        .continue-shopping:hover {
            color: #C6A86A;
        }
        .item-total {
            font-weight: 700;
            color: #000;
        }
        .delivery-note {
            font-size: 0.8rem;
            color: #dc3545;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <section class="cart-header">
        <div class="container text-center">
            <h1><i class="bi bi-cart"></i> Shopping Cart</h1>
            <p class="lead">Review and manage your items</p>
        </div>
    </section>

    <div class="container py-4">
        <div class="row">
            <div class="col-lg-8">
                <div id="cart-items-container">
                    <!-- Cart items will be loaded here -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-warning" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="cart-summary" id="cart-summary">
                    <h4 class="fw-bold mb-4">Order Summary</h4>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span class="fw-bold" id="subtotal">Ksh 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Items</span>
                        <span class="fw-bold" id="itemCount">0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery</span>
                        <span class="fw-bold text-danger">Customer to arrange</span>
                    </div>
                    <div class="delivery-note text-center">
                        <i class="bi bi-info-circle"></i> Delivery not included. Please contact us to arrange pickup or delivery.
                    </div>
                    <div class="summary-total d-flex justify-content-between mt-3 pt-3 border-top">
                        <span>Total</span>
                        <span id="total">Ksh 0</span>
                    </div>
                    
                    <a href="checkout.html" class="checkout-btn mt-4">
                        <i class="bi bi-lock me-2"></i>Proceed to Checkout
                    </a>
                    
                    <div class="text-center mt-3">
                        <a href="products.html" class="continue-shopping">
                            <i class="bi bi-arrow-left"></i> Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const basePath = '/assets/images/';

        document.addEventListener('DOMContentLoaded', function() {
            displayCart();
            loadNavbar();
            loadFooter();
        });

        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cart-items-container');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="bi bi-cart-x" style="font-size: 4rem;"></i>
                        <h4 class="mt-3">Your cart is empty</h4>
                        <p class="text-muted">Looks like you haven't added any items yet.</p>
                        <a href="products.html" class="btn btn-warning mt-3">Shop Now</a>
                    </div>
                `;
                updateSummary(0, 0);
                return;
            }

            let html = '';
            let subtotal = 0;
            let totalItems = 0;

            cart.forEach((item, index) => {
                const itemQuantity = item.quantity || 1;
                const itemTotal = item.price * itemQuantity;
                subtotal += itemTotal;
                totalItems += itemQuantity;

                // Get image filename from path
                const imageFile = item.image ? item.image.split('/').pop() : 'placeholder.jpg';

                html += `
                    <div class="cart-item" id="cart-item-${index}">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                <img src="${basePath}${imageFile}" 
                                     class="cart-item-image" 
                                     alt="${item.name}"
                                     onerror="this.src='${basePath}placeholder.jpg'">
                            </div>
                            <div class="col-md-4">
                                <h5 class="cart-item-name">${item.name}</h5>
                                <p class="text-muted small mb-0">Price: Ksh ${item.price.toLocaleString()}</p>
                            </div>
                            <div class="col-md-3">
                                <div class="quantity-control">
                                    <button class="quantity-btn" onclick="updateCartItemQuantity(${index}, -1, ${item.price})">−</button>
                                    <input type="number" class="quantity-input" id="cart-qty-${index}" 
                                           value="${itemQuantity}" min="1" 
                                           onchange="updateCartItemQuantityDirect(${index}, this.value, ${item.price})">
                                    <button class="quantity-btn" onclick="updateCartItemQuantity(${index}, 1, ${item.price})">+</button>
                                </div>
                            </div>
                            <div class="col-md-2">
                                <div class="item-total" id="item-total-${index}">Ksh ${itemTotal.toLocaleString()}</div>
                            </div>
                            <div class="col-md-1 text-end">
                                <i class="bi bi-trash remove-btn" onclick="removeFromCart(${index})"></i>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            updateSummary(subtotal, totalItems);
        }

        function updateCartItemQuantity(index, change, price) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (!cart[index]) return;

            const input = document.getElementById(`cart-qty-${index}`);
            let newQty = parseInt(input.value) + change;
            
            if (newQty < 1) newQty = 1;
            
            input.value = newQty;
            cart[index].quantity = newQty;
            
            // Update only the item total and summary, not the whole cart
            const itemTotal = price * newQty;
            document.getElementById(`item-total-${index}`).textContent = `Ksh ${itemTotal.toLocaleString()}`;
            
            localStorage.setItem('cart', JSON.stringify(cart));
            
            // Recalculate and update summary
            recalculateSummary();
            updateCartCount();
        }

        function updateCartItemQuantityDirect(index, value, price) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (!cart[index]) return;
            
            let newQty = parseInt(value);
            
            if (isNaN(newQty) || newQty < 1) {
                newQty = 1;
                document.getElementById(`cart-qty-${index}`).value = 1;
            }
            
            cart[index].quantity = newQty;
            
            // Update only the item total and summary
            const itemTotal = price * newQty;
            document.getElementById(`item-total-${index}`).textContent = `Ksh ${itemTotal.toLocaleString()}`;
            
            localStorage.setItem('cart', JSON.stringify(cart));
            
            // Recalculate and update summary
            recalculateSummary();
            updateCartCount();
        }

        function recalculateSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            let subtotal = 0;
            let totalItems = 0;
            
            cart.forEach(item => {
                const qty = item.quantity || 1;
                subtotal += item.price * qty;
                totalItems += qty;
            });
            
            updateSummary(subtotal, totalItems);
        }

        function removeFromCart(index) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const itemName = cart[index]?.name || 'Item';
            
            if (confirm(`Remove ${itemName} from cart?`)) {
                cart.splice(index, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                displayCart(); // Only refresh on remove
                updateCartCount();
            }
        }

        function updateSummary(subtotal, totalItems) {
            // No delivery fee - customer arranges delivery themselves
            const total = subtotal;
            
            document.getElementById('subtotal').textContent = `Ksh ${subtotal.toLocaleString()}`;
            document.getElementById('itemCount').textContent = totalItems;
            document.getElementById('total').textContent = `Ksh ${total.toLocaleString()}`;
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const counts = document.querySelectorAll('#cart-count');
            counts.forEach(el => {
                if (el) el.textContent = totalItems;
            });
        }

        function loadNavbar() {
            fetch('navbar.html')
                .then(r => r.text())
                .then(d => {
                    document.getElementById('navbar').innerHTML = d;
                    updateCartCount();
                })
                .catch(e => console.log('Navbar error:', e));
        }

        function loadFooter() {
            fetch('footer.html')
                .then(r => r.text())
                .then(d => document.getElementById('footer').innerHTML = d)
                .catch(e => console.log('Footer error:', e));
        }
    </script>
</body>
</html>
