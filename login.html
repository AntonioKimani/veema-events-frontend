<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Veema Events</title>
    <script src="env-config.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-header {
            background: #C6A75E;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h2 {
            margin: 0;
            font-weight: 600;
        }
        .login-body {
            padding: 40px;
            background: white;
        }
        .form-control {
            height: 50px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            padding: 10px 15px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #C6A75E;
            box-shadow: none;
        }
        .btn-login {
            background: #C6A75E;
            color: white;
            height: 50px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #b8954f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 167, 94, 0.3);
        }
        .btn-google {
            background: white;
            color: #757575;
            border: 2px solid #ddd;
            height: 50px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #C6A75E;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-google i {
            color: #4285f4;
            font-size: 1.3rem;
        }
        .divider {
            position: relative;
            text-align: center;
            margin: 30px 0;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            z-index: 1;
        }
        .divider span {
            background: white;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            color: #999;
        }
        .alert {
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        .register-link a {
            color: #C6A75E;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .spinner-border {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card">
                    <div class="login-header">
                        <h2><i class="bi bi-calendar-event"></i> Veema Events</h2>
                        <p class="mb-0">Welcome back! Please login to continue</p>
                    </div>
                    
                    <div class="login-body">
                        <!-- Error Message Display -->
                        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                        
                        <!-- Success Message Display -->
                        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                        <!-- Login Form -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="email" 
                                       placeholder="Enter your email" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" 
                                       placeholder="Enter your password" required>
                                <div class="text-end mt-2">
                                    <a href="forgot-password.html" class="text-muted small">Forgot password?</a>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-login w-100" id="loginBtn">
                                <span id="loginText">Login</span>
                                <span id="loginSpinner" style="display: none;">
                                    <span class="spinner-border spinner-border-sm"></span> Logging in...
                                </span>
                            </button>
                        </form>

                        <!-- Divider -->
                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <!-- Google Login Button - UPDATE THIS URL AFTER DEPLOYMENT -->
                        <a href="${window.ENV?.BACKEND_URL || 'http://localhost:5000'}/api/auth/google" class="btn-google w-100">
                           <i class="bi bi-google"></i> 
                            Sign in with Google
                        </a>

                        <!-- Register Link -->
                        <div class="register-link">
                            <p class="mb-0">Don't have an account? <a href="register.html">Create one now</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ============================================
        // AFTER DEPLOYMENT, REPLACE WITH YOUR LIVE BACKEND URL
        // ============================================
       const API_BASE_URL = 'https://veema-events-backend.onrender.com/api';
        
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'index.html';
            }
            
            // Check for error in URL (from Google auth failure)
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                showError(decodeURIComponent(error));
            }
            
            loadNavbar();
            loadFooter();
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            setLoading(true);
            hideError();
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    setTimeout(() => {
                        if (data.user && data.user.role === 'admin') {
                            window.location.href = 'admin/dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    showError(data.message || 'Login failed. Please check your credentials.');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Connection error. Please try again.');
                setLoading(false);
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => hideError(), 5000);
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function setLoading(isLoading) {
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            const loginBtn = document.getElementById('loginBtn');
            
            if (isLoading) {
                loginText.style.display = 'none';
                loginSpinner.style.display = 'inline-block';
                loginBtn.disabled = true;
            } else {
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        function loadNavbar() {
            fetch('navbar.html')
                .then(r => r.text())
                .then(d => document.getElementById('navbar').innerHTML = d)
                .catch(e => console.log('Navbar load error:', e));
        }

        function loadFooter() {
            fetch('footer.html')
                .then(r => r.text())
                .then(d => document.getElementById('footer').innerHTML = d)
                .catch(e => console.log('Footer load error:', e));
        }
    </script>
</body>
</html>
