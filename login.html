<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Veema Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #F8F5EF 0%, #E8E2D9 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .login-header {
            background: #171717;
            color: #C6A86A;
            padding: 30px;
            text-align: center;
        }
        .login-header h2 {
            margin: 0;
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
        }
        .login-body {
            padding: 40px;
            background: white;
        }
        .form-control {
            height: 50px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            padding: 10px 15px;
            font-size: 16px;
        }
        .form-control:focus {
            border-color: #C6A86A;
            box-shadow: none;
        }
        .btn-login {
            background: #171717;
            color: white;
            height: 50px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #C6A86A;
            color: #171717;
        }
        .btn-google {
            background: white;
            color: #757575;
            border: 2px solid #ddd;
            height: 50px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            text-decoration: none;
            width: 100%;
        }
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #C6A86A;
        }
        .btn-google i {
            color: #4285f4;
            font-size: 1.3rem;
        }
        .divider {
            position: relative;
            text-align: center;
            margin: 30px 0;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            z-index: 1;
        }
        .divider span {
            background: white;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            color: #999;
        }
        .alert {
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card">
                    <div class="login-header">
                        <h2><i class="bi bi-calendar-event"></i> Veema Events</h2>
                        <p class="mb-0 text-white-50">Welcome back</p>
                    </div>
                    
                    <div class="login-body">
                        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-login w-100" id="loginBtn">
                                <span id="loginText">Login</span>
                                <span id="loginSpinner" style="display: none;">Logging in...</span>
                            </button>
                        </form>

                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <button class="btn-google w-100" onclick="googleLogin()">
                            <i class="bi bi-google"></i> Sign in with Google
                        </button>

                        <div class="text-center mt-4">
                            <p class="mb-0">Don't have an account? <a href="register.html" style="color: #C6A86A;">Create one now</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ============================================
        // FIREBASE CONFIG - YOUR ACTUAL CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0D7OnPSrkF0fFrcdQnYpTJGIyGjUNlWU",
            authDomain: "veema-events.firebaseapp.com",
            projectId: "veema-events",
            storageBucket: "veema-events.firebasestorage.app",
            messagingSenderId: "933547953857",
            appId: "1:933547953857:web:84fe2d92fb721763508e40"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Check if already logged in
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Email/Password Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            errorDiv.style.display = 'none';
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            loginBtn.disabled = true;
            
            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                // Success - redirect handled by onAuthStateChanged
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
                loginBtn.disabled = false;
            }
        });

        // Google Login
        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await firebase.auth().signInWithPopup(provider);
                // Success - redirect handled by onAuthStateChanged
            } catch (error) {
                alert(error.message);
            }
        }

        // Load navbar and footer
        function loadNavbar() {
            fetch('navbar.html')
                .then(r => r.text())
                .then(d => document.getElementById('navbar').innerHTML = d)
                .catch(e => console.log('Navbar error:', e));
        }

        function loadFooter() {
            fetch('footer.html')
                .then(r => r.text())
                .then(d => document.getElementById('footer').innerHTML = d)
                .catch(e => console.log('Footer error:', e));
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadNavbar();
            loadFooter();
        });
    </script>
</body>
</html>
