<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Veema Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #F8F5EF 0%, #E8E2D9 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .register-header {
            background: #171717;
            color: #C6A86A;
            padding: 30px;
            text-align: center;
        }
        .register-header h2 {
            margin: 0;
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
        }
        .register-body {
            padding: 40px;
            background: white;
        }
        .form-control {
            height: 50px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #C6A86A;
            box-shadow: none;
        }
        .btn-register {
            background: #171717;
            color: white;
            height: 50px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: #C6A86A;
            color: #171717;
        }
        .btn-google {
            background: white;
            border: 2px solid #ddd;
            height: 50px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            text-decoration: none;
            color: #757575;
        }
        .btn-google:hover {
            border-color: #C6A86A;
        }
        .divider {
            position: relative;
            text-align: center;
            margin: 30px 0;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            z-index: 1;
        }
        .divider span {
            background: white;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            color: #999;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="register-card">
                    <div class="register-header">
                        <h2><i class="bi bi-calendar-event"></i> Veema Events</h2>
                        <p class="mb-0 text-white-50">Create your account</p>
                    </div>
                    
                    <div class="register-body">
                        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Create a password" required minlength="6">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                            </div>
                            <button type="submit" class="btn btn-register w-100" id="registerBtn">
                                <span id="registerText">Create Account</span>
                                <span id="registerSpinner" style="display: none;">Creating account...</span>
                            </button>
                        </form>

                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <button class="btn-google w-100" onclick="googleRegister()">
                            <i class="bi bi-google"></i> Sign up with Google
                        </button>

                        <div class="text-center mt-4">
                            <p class="mb-0">Already have an account? <a href="login.html" style="color: #C6A86A;">Sign in</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0D7OnPSrkF0fFrcdQnYpTJGIyGjUNlWU",
            authDomain: "veema-events.firebaseapp.com",
            projectId: "veema-events",
            storageBucket: "veema-events.firebasestorage.app",
            messagingSenderId: "933547953857",
            appId: "1:933547953857:web:84fe2d92fb721763508e40"
        };

        firebase.initializeApp(firebaseConfig);

        // Check if already logged in
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Email/Password Registration
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const name = document.getElementById('name').value;
            const errorDiv = document.getElementById('errorMessage');
            const registerBtn = document.getElementById('registerBtn');
            const registerText = document.getElementById('registerText');
            const registerSpinner = document.getElementById('registerSpinner');
            
            errorDiv.style.display = 'none';
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            registerText.style.display = 'none';
            registerSpinner.style.display = 'inline-block';
            registerBtn.disabled = true;
            
            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                // Update profile with name
                await userCredential.user.updateProfile({ displayName: name });
                // Success - redirect handled by onAuthStateChanged
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                registerText.style.display = 'inline';
                registerSpinner.style.display = 'none';
                registerBtn.disabled = false;
            }
        });

        // Google Registration/Login
        async function googleRegister() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await firebase.auth().signInWithPopup(provider);
            } catch (error) {
                alert(error.message);
            }
        }

        function loadNavbar() {
            fetch('navbar.html')
                .then(r => r.text())
                .then(d => document.getElementById('navbar').innerHTML = d);
        }

        function loadFooter() {
            fetch('footer.html')
                .then(r => r.text())
                .then(d => document.getElementById('footer').innerHTML = d);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadNavbar();
            loadFooter();
        });
    </script>
    <script>
    function handleLogout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
