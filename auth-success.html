<!DOCTYPE html>
<html>
<head>
    <title>Authentication Success - Veema Events</title>
    <script src="env-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #C6A75E 0%, #8B7355 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Veema Events</h1>
        <div id="status">
            <div class="spinner"></div>
            <h2>Completing authentication...</h2>
        </div>
    </div>

    <script>
        // ============================================
        // AFTER DEPLOYMENT, REPLACE WITH YOUR LIVE BACKEND URL
        // ============================================
const API_BASE_URL = 'https://veema-events-backend.railway.app/api';        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const error = urlParams.get('error');

        const statusDiv = document.getElementById('status');

        if (error) {
            statusDiv.innerHTML = `
                <h2 class="error">Authentication Failed</h2>
                <p>${error}</p>
                <a href="login.html" style="color: white; text-decoration: underline;">Back to Login</a>
            `;
        } else if (token) {
            localStorage.setItem('token', token);
            
            fetch(`${API_BASE_URL}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    statusDiv.innerHTML = `
                        <h2 class="success">✓ Authentication Successful!</h2>
                        <p>Welcome, ${data.user.name}!</p>
                        <p>Redirecting...</p>
                    `;
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error('Failed to get user data');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                statusDiv.innerHTML = `
                    <h2 class="error">Error</h2>
                    <p>Failed to get user data</p>
                    <a href="login.html" style="color: white; text-decoration: underline;">Back to Login</a>
                `;
            });
        } else {
            statusDiv.innerHTML = `
                <h2 class="error">No Token Received</h2>
                <a href="login.html" style="color: white; text-decoration: underline;">Back to Login</a>
            `;
        }
    </script>
</body>
</html>
