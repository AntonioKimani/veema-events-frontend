<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Veema Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #F8F5EF; font-family: 'Inter', sans-serif; }
        .sidebar { background: #171717; min-height: 100vh; color: white; }
        .sidebar a { color: #C6A86A; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #2c2c2c; color: #fff; }
        .sidebar a i { margin-right: 10px; width: 25px; }
        .main-content { padding: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #C6A86A; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar">
                <div class="p-3 text-center border-bottom border-secondary">
                    <h4 class="text-warning mb-0">Veema Events</h4>
                    <small class="text-muted">Admin Panel</small>
                </div>
                <div class="mt-3">
                    <a href="dashboard.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a href="products.html"><i class="bi bi-box"></i> Products</a>
                    <hr class="mx-3 my-2 bg-secondary">
                    <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
                </div>
            </div>

            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Admin Dashboard</h2>
                    <div>
                        <span id="adminEmail" class="me-3 text-muted"></span>
                        <button class="btn-logout" onclick="logout()">Logout</button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalProducts">-</div>
                            <div class="text-muted">Total Products</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalOrders">-</div>
                            <div class="text-muted">Total Orders</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalUsers">-</div>
                            <div class="text-muted">Total Users</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalRevenue">-</div>
                            <div class="text-muted">Revenue (Ksh)</div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-body">
                        <h5>Quick Actions</h5>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <a href="products.html" class="btn btn-dark w-100">Manage Products</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA0D7OnPSrkF0fFrcdQnYpTJGIyGjUNlWU",
            authDomain: "veema-events.firebaseapp.com",
            projectId: "veema-events",
            storageBucket: "veema-events.firebasestorage.app",
            messagingSenderId: "933547953857",
            appId: "1:933547953857:web:84fe2d92fb721763508e40"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check if user is logged in and is admin (using Firebase claims)
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            document.getElementById('adminEmail').textContent = user.email;

            // Get ID token with claims
            const tokenResult = await user.getIdTokenResult();
            
            // Check if user has admin claim
            if (tokenResult.claims.admin === true) {
                console.log('✅ Admin user confirmed!');
                loadStats();
            } else {
                console.log('❌ Not an admin user');
                alert('Access denied. Admin privileges required.');
                window.location.href = '../index.html';
            }
        });

        function loadStats() {
            // Load stats from localStorage or API
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('totalProducts').textContent = '17'; // Hardcoded for now
            document.getElementById('totalOrders').textContent = '0';
            document.getElementById('totalUsers').textContent = '1';
            document.getElementById('totalRevenue').textContent = '0';
        }

        async function logout() {
            await auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
