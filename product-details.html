<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Veema Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .product-info {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        .product-price {
            color: #C6A75E;
            font-size: 2rem;
            font-weight: bold;
        }
        .product-category {
            display: inline-block;
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        .stock-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 500;
        }
        .stock-badge.in-stock {
            background: #d4edda;
            color: #155724;
        }
        .stock-badge.low-stock {
            background: #fff3cd;
            color: #856404;
        }
        .stock-badge.out-of-stock {
            background: #f8d7da;
            color: #721c24;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            max-width: 150px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            overflow: hidden;
        }
        .quantity-btn {
            width: 40px;
            height: 40px;
            background: #f8f9fa;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .quantity-btn:hover {
            background: #C6A75E;
            color: white;
        }
        .quantity-input {
            width: 60px;
            height: 40px;
            border: none;
            text-align: center;
            font-weight: bold;
            border-left: 2px solid #dee2e6;
            border-right: 2px solid #dee2e6;
        }
        .back-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="container py-4">
        <div id="product-details">
            <div class="text-center py-5">
                <div class="spinner-border text-warning" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ============================================
        // COMPLETE PRODUCT DATA WITH CORRECT INFO
        // ============================================
        
        const basePath = '/assets/images/';
        
        const products = {
            1: {
                id: 1,
                name: "Luxury Table Cloth - Gold",
                price: 3500,
                description: "Premium quality gold table cloth perfect for weddings and formal events. 100% polyester, stain resistant, wrinkle-free. Size: 180x280cm",
                category: "Table Linens",
                stock: 25,
                image: basePath + "tablecloth-gold.jpg"
            },
            2: {
                id: 2,
                name: "Luxury Table Cloth - White",
                price: 3500,
                description: "Elegant white table cloth for classic wedding setups. Wrinkle-free fabric, easy to clean. Size: 180x280cm",
                category: "Table Linens",
                stock: 30,
                image: basePath + "tablecloth-white.jpg"
            },
            3: {
                id: 3,
                name: "Premium Chair Ribbon - Burgundy",
                price: 800,
                description: "Beautiful burgundy ribbons for chair decorations. Each pack contains 50 pieces, 2 meters each. Satin finish.",
                category: "Ribbons",
                stock: 100,
                image: basePath + "ribbon-burgundy.jpg"
            },
            4: {
                id: 4,
                name: "Premium Chair Ribbon - Gold",
                price: 850,
                description: "Metallic gold ribbons for luxury chair styling. 2 meters each, pack of 50.",
                category: "Ribbons",
                stock: 75,
                image: basePath + "ribbon-gold.jpg"
            },
            5: {
                id: 5,
                name: "Gold Charger Plate",
                price: 450,
                description: "Metallic gold charger plate for elegant table settings. Set of 6. Diameter: 30cm",
                category: "Tableware",
                stock: 200,
                image: basePath + "charger-gold.jpg"
            },
            6: {
                id: 6,
                name: "Crystal Centerpiece",
                price: 2500,
                description: "Beautiful crystal centerpiece with LED lights. Perfect for head tables. Height: 25cm",
                category: "Decor",
                stock: 15,
                image: basePath + "centerpiece-crystal.jpg"
            },
            7: {
                id: 7,
                name: "Sequin Table Runner - Silver",
                price: 1200,
                description: "Sparkling silver sequin table runner for glamorous events. Length: 200cm",
                category: "Table Linens",
                stock: 20,
                image: basePath + "runner-sequin.jpg"
            },
            9: {
                id: 9,
                name: "Sage Green Balloons",
                price: 250,
                description: "Sage green balloons - perfect for weddings and events. Pack of 100 pieces.",
                category: "Decor",
                stock: 50,
                image: basePath + "balloons-sage.jpeg"
            },
            10: {
                id: 10,
                name: "Seat Spandex Cover (Light)",
                price: 245,
                description: "Light weight spandex seat cover for chairs. Stretchy and easy to fit.",
                category: "Table Linens",
                stock: 100,
                image: basePath + "spandex-cover.jpeg"
            },
            11: {
                id: 11,
                name: "Seat Spandex Cover (Heavy)",
                price: 380,
                description: "Heavy duty spandex seat cover for chairs. Premium quality, durable material.",
                category: "Table Linens",
                stock: 80,
                image: basePath + "spandex-cover.jpeg"
            },
            12: {
                id: 12,
                name: "Cheese Table Runner",
                price: 450,
                description: "Elegant cheese pattern table runner for rustic and vintage themed events.",
                category: "Table Linens",
                stock: 40,
                image: basePath + "cheese-runner.jpeg"
            },
            13: {
                id: 13,
                name: "Tie Backs",
                price: 80,
                description: "Decorative tie backs for chair covers and drapes. Set of 10 pieces.",
                category: "Ribbons",
                stock: 200,
                image: basePath + "tie-backs.jpeg"
            },
            14: {
                id: 14,
                name: "Gold Spiral Napkin Ring",
                price: 100,
                description: "Elegant gold spiral design napkin rings. Set of 6 pieces. Modern design.",
                category: "Tableware",
                stock: 150,
                image: basePath + "napring-gold-spiral.jpeg"
            },
            15: {
                id: 15,
                name: "Pearl Napkin Rings",
                price: 150,
                description: "Classic pearl embellished napkin rings. Set of 6 pieces. Perfect for weddings.",
                category: "Tableware",
                stock: 120,
                image: basePath + "napring-pearl.jpeg"
            },
            16: {
                id: 16,
                name: "Butterfly Gold Napkin Ring",
                price: 130,
                description: "Beautiful butterfly design gold napkin rings. Set of 6 pieces. Unique design.",
                category: "Tableware",
                stock: 100,
                image: basePath + "napring-butterfly.jpeg"
            },
            17: {
                id: 17,
                name: "Acrylic Gold Stand",
                price: 5000,
                description: "Acrylic gold stand for centerpieces. Elegant and modern design. Height: 40cm",
                category: "Decor",
                stock: 15,
                image: basePath + "acrylic-stand.jpeg"
            }
        };

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id') || '1');
        
        // Get the product
        const product = products[productId] || products[1];
        
        // Determine stock status
        let stockStatus = '';
        let stockClass = '';
        if (product.stock > 10) {
            stockStatus = 'In Stock';
            stockClass = 'in-stock';
        } else if (product.stock > 0) {
            stockStatus = `Only ${product.stock} left`;
            stockClass = 'low-stock';
        } else {
            stockStatus = 'Out of Stock';
            stockClass = 'out-of-stock';
        }

        // Display product
        document.getElementById('product-details').innerHTML = `
            <div class="row">
                <div class="col-md-6 text-center">
                    <img src="${product.image}" class="product-image" alt="${product.name}"
                         onerror="this.src='${basePath}placeholder.jpg'">
                </div>
                <div class="col-md-6">
                    <div class="product-info">
                        <span class="product-category">
                            <i class="bi bi-tag"></i> ${product.category}
                        </span>
                        
                        <h1 class="fw-bold mb-3">${product.name}</h1>
                        
                        <div class="product-price mb-3">
                            Ksh ${product.price.toLocaleString()}
                        </div>
                        
                        <div class="mb-3">
                            <span class="stock-badge ${stockClass}">
                                <i class="bi ${product.stock > 0 ? 'bi-check-circle' : 'bi-x-circle'}"></i> 
                                ${stockStatus}
                            </span>
                        </div>
                        
                        <p class="mb-4">${product.description}</p>
                        
                        <div class="mb-4">
                            <h6>Quantity</h6>
                            <div class="quantity-selector">
                                <button class="quantity-btn" onclick="updateQuantity(-1)">−</button>
                                <input type="text" class="quantity-input" id="quantity" value="1" readonly>
                                <button class="quantity-btn" onclick="updateQuantity(1)">+</button>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button class="btn btn-warning btn-lg" 
                                    onclick="addToCart(${product.id})"
                                    ${product.stock < 1 ? 'disabled' : ''}>
                                <i class="bi bi-cart-plus"></i> 
                                ${product.stock < 1 ? 'Out of Stock' : 'Add to Cart'}
                            </button>
                            
                            <a href="products.html" class="btn btn-outline-secondary back-btn">
                                <i class="bi bi-arrow-left"></i> Continue Shopping
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `;

        let currentQuantity = 1;

        function updateQuantity(change) {
            const input = document.getElementById('quantity');
            currentQuantity = parseInt(input.value) + change;
            
            if (currentQuantity < 1) currentQuantity = 1;
            if (currentQuantity > product.stock) currentQuantity = product.stock;
            
            input.value = currentQuantity;
        }

        function addToCart(id) {
            const product = products[id];
            const quantity = parseInt(document.getElementById('quantity').value);
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            for (let i = 0; i < quantity; i++) {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            
            alert(`${quantity} × ${product.name} added to cart!`);
            updateCartCount();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const counts = document.querySelectorAll('#cart-count');
            counts.forEach(el => {
                if (el) el.textContent = cart.length;
            });
        }

        // Load navbar and footer
        fetch('navbar.html')
            .then(r => r.text())
            .then(d => {
                document.getElementById('navbar').innerHTML = d;
                updateCartCount();
            });
            
        fetch('footer.html')
            .then(r => r.text())
            .then(d => document.getElementById('footer').innerHTML = d);
    </script>
</body>
</html>
