<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Veema Events</title>
    
    <!-- Meta Pixel Code -->
    <script>

    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1307602061219417&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F8F5EF;
            font-family: 'Inter', sans-serif;
        }
        .product-image-main {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 15px;
            cursor: zoom-in;
            background-color: #f5f5f5;
        }
        .product-thumbnail {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            background-color: #f5f5f5;
        }
        .product-thumbnail:hover {
            opacity: 0.8;
        }
        .product-thumbnail.active {
            border-color: #C6A86A;
            transform: scale(0.95);
        }
        .thumbnail-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .thumbnail-container::-webkit-scrollbar {
            height: 5px;
        }
        .thumbnail-container::-webkit-scrollbar-thumb {
            background: #C6A86A;
            border-radius: 10px;
        }
        .product-price {
            font-size: 2rem;
            color: #C6A86A;
            font-weight: bold;
        }
        .product-category {
            display: inline-block;
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .stock-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .stock-badge.in-stock {
            background: #d4edda;
            color: #155724;
        }
        .stock-badge.low-stock {
            background: #fff3cd;
            color: #856404;
        }
        .stock-badge.out-of-stock {
            background: #f8d7da;
            color: #721c24;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            max-width: 150px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            overflow: hidden;
        }
        .quantity-btn {
            width: 40px;
            height: 40px;
            background: #f8f9fa;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .quantity-btn:hover {
            background: #C6A86A;
            color: white;
        }
        .quantity-input {
            width: 60px;
            height: 40px;
            border: none;
            text-align: center;
            font-weight: 600;
            border-left: 1px solid #dee2e6;
            border-right: 1px solid #dee2e6;
        }
        .product-info {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
        }
        .zoom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .zoom-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .zoom-modal.active {
            display: flex;
        }
        .close-zoom {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .color-dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: inline-block;
            margin: 5px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-dot:hover {
            transform: scale(1.1);
            border-color: #C6A86A;
        }
        .color-dot.selected {
            border-color: #C6A86A;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #C6A86A;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="container py-5" id="productContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Zoom Modal -->
    <div class="zoom-modal" id="zoomModal">
        <span class="close-zoom" onclick="closeZoom()">&times;</span>
        <img id="zoomImage" src="" alt="Zoomed product">
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const basePath = '/assets/images/';
        
        // Complete product database
        const defaultProducts = [
            { id: 1, name: "Light Seat Spandex", originalPrice: 450, price: 350, mainCategory: "Chair Covers & Decor", subCategory: "Light Seat Spandex", images: [basePath + "spandex-cover.jpeg"], stock: 100, featured: true, description: "Light weight spandex seat cover", colors: [{name:"White",value:"#FFFFFF"},{name:"Black",value:"#000000"},{name:"Gold",value:"#C6A86A"}] },
            { id: 2, name: "Heavy Seat Spandex", originalPrice: 550, price: 450, mainCategory: "Chair Covers & Decor", subCategory: "Heavy Seat Spandex", images: [basePath + "spandex-cover.jpeg"], stock: 80, featured: true, description: "Heavy duty spandex seat cover", colors: [{name:"White",value:"#FFFFFF"},{name:"Black",value:"#000000"}] },
            { id: 3, name: "Tie Backs", originalPrice: 120, price: 80, mainCategory: "Chair Covers & Decor", subCategory: "Tie Backs", images: [basePath + "tie-backs.jpeg"], stock: 200, featured: false, description: "Decorative tie backs" },
            { id: 4, name: "Jacquard Round Table Cloth - Gold", originalPrice: 4500, price: 3500, mainCategory: "Table Covers & Linens", subCategory: "Jacquard Round Table Cloth", images: [basePath + "tablecloth-gold.jpg"], stock: 25, featured: true, description: "Premium gold jacquard table cloth" },
            { id: 5, name: "Jacquard Round Table Cloth - White", originalPrice: 4500, price: 3500, mainCategory: "Table Covers & Linens", subCategory: "Jacquard Round Table Cloth", images: [basePath + "tablecloth-white.jpg"], stock: 30, featured: true, description: "Elegant white jacquard table cloth" },
            { id: 6, name: "Cheese Runner", originalPrice: 550, price: 450, mainCategory: "Table Covers & Linens", subCategory: "Cheese Runner", images: [basePath + "cheese-runner.jpeg"], stock: 40, featured: true, description: "Cheese pattern table runner" },
            { id: 7, name: "Sequin Runner", originalPrice: 1500, price: 1200, mainCategory: "Table Covers & Linens", subCategory: "Sequin Runner", images: [basePath + "runner-sequin.jpg"], stock: 20, featured: true, description: "Sparkling sequin table runner" },
            { id: 8, name: "Gold Charger Plate", originalPrice: 600, price: 450, mainCategory: "Tableware & Dining Accessories", subCategory: "Charger Plates", images: [basePath + "charger-gold.jpg"], stock: 200, featured: true, description: "Elegant gold charger plate" },
            { id: 9, name: "Gold Spiral Napkin Ring", originalPrice: 150, price: 100, mainCategory: "Tableware & Dining Accessories", subCategory: "Napkin Rings", images: [basePath + "napring-gold-spiral.jpeg"], stock: 150, featured: true, description: "Gold spiral design napkin rings" },
            { id: 10, name: "Pearl Napkin Rings", originalPrice: 200, price: 150, mainCategory: "Tableware & Dining Accessories", subCategory: "Napkin Rings", images: [basePath + "napring-pearl.jpeg"], stock: 120, featured: false, description: "Pearl embellished napkin rings" },
            { id: 11, name: "Sage Green Balloons", originalPrice: 300, price: 250, mainCategory: "Decorations & Styling", subCategory: "Balloons", images: [basePath + "balloons-sage.jpeg"], stock: 50, featured: true, description: "Pack of 100 sage green balloons" },
            { id: 12, name: "Crystal Centerpiece", originalPrice: 3000, price: 2500, mainCategory: "Decorations & Styling", subCategory: "Center Pieces", images: [basePath + "centerpiece-crystal.jpg"], stock: 15, featured: true, description: "Beautiful crystal centerpiece" }
        ];

        let products = [];
        
        try {
            const stored = localStorage.getItem('products');
            if (stored && stored !== 'undefined' && stored !== 'null') {
                const parsed = JSON.parse(stored);
                if (parsed && parsed.length > 0) {
                    products = parsed;
                } else {
                    products = defaultProducts;
                }
            } else {
                products = defaultProducts;
                localStorage.setItem('products', JSON.stringify(products));
            }
        } catch (e) {
            products = defaultProducts;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        let currentQuantity = 1;
        let selectedColor = null;

        document.addEventListener('DOMContentLoaded', function() {
            if (!productId || isNaN(productId)) {
                document.getElementById('productContainer').innerHTML = `
                    <div class="alert alert-danger text-center">
                        <i class="bi bi-exclamation-triangle"></i>
                        Invalid product ID. <a href="products.html">Back to products</a>
                    </div>
                `;
                return;
            }
            
            loadProductDetails();
            loadNavbar();
            loadFooter();
        });

        function loadProductDetails() {
            const product = products.find(p => p.id === productId);
            
            if (!product) {
                document.getElementById('productContainer').innerHTML = `
                    <div class="alert alert-danger text-center">
                        <i class="bi bi-exclamation-triangle"></i>
                        Product not found. <a href="products.html">Back to products</a>
                    </div>
                `;
                return;
            }
            
            displayProduct(product);
        }

        function displayProduct(product) {
            const images = (product.images && product.images.length) ? product.images : [product.image || basePath + 'placeholder.jpg'];
            
            let stockStatus = '';
            let stockClass = '';
            if (product.stock > 10) {
                stockStatus = 'In Stock';
                stockClass = 'in-stock';
            } else if (product.stock > 0) {
                stockStatus = `Only ${product.stock} left`;
                stockClass = 'low-stock';
            } else {
                stockStatus = 'Out of Stock';
                stockClass = 'out-of-stock';
            }
            
            let colorsHtml = '';
            if (product.colors && product.colors.length) {
                colorsHtml = `
                    <div class="mb-4">
                        <h6>Available Colors</h6>
                        <div class="d-flex flex-wrap">
                            ${product.colors.map(color => `
                                <div class="color-dot" style="background-color: ${color.value};" 
                                     title="${color.name}" onclick="selectColor(this, '${color.name}')"></div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            const html = `
                <div class="row">
                    <div class="col-md-6">
                        <img src="${images[0]}" 
                             class="product-image-main" 
                             alt="${escapeHtml(product.name)}"
                             onclick="openZoom('${images[0]}')"
                             id="mainImage"
                             onerror="this.src='${basePath}placeholder.jpg'">
                        
                        ${images.length > 1 ? `
                        <div class="thumbnail-container">
                            ${images.map((img, index) => `
                                <img src="${img}" 
                                     class="product-thumbnail ${index === 0 ? 'active' : ''}" 
                                     alt="Product view ${index + 1}"
                                     onclick="changeMainImage('${img}', ${index})"
                                     onerror="this.src='${basePath}placeholder.jpg'">
                            `).join('')}
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="col-md-6">
                        <div class="product-info">
                            <span class="product-category">
                                <i class="bi bi-tag"></i> ${escapeHtml(product.mainCategory || product.category || 'Uncategorized')}
                                ${product.subCategory ? ` / ${escapeHtml(product.subCategory)}` : ''}
                            </span>
                            
                            <h1 class="fw-bold mb-3">${escapeHtml(product.name)}</h1>
                            
                            <div class="product-price mb-3">
                                ${product.originalPrice ? `<span class="original-price" style="text-decoration: line-through; color: #999; font-size: 1.2rem; margin-right: 10px;">Ksh ${product.originalPrice.toLocaleString()}</span>` : ''}
                                Ksh ${Number(product.price).toLocaleString()}
                            </div>
                            
                            <div class="mb-3">
                                <span class="stock-badge ${stockClass}">
                                    <i class="bi ${product.stock > 0 ? 'bi-check-circle' : 'bi-x-circle'}"></i> 
                                    ${stockStatus}
                                </span>
                            </div>
                            
                            <p class="mb-4">${escapeHtml(product.description || 'No description available.')}</p>
                            
                            ${colorsHtml}
                            
                            <div class="mb-4">
                                <h6>Quantity</h6>
                                <div class="quantity-selector">
                                    <button class="quantity-btn" onclick="updateQuantity(-1)">−</button>
                                    <input type="text" class="quantity-input" id="quantity" value="1" readonly>
                                    <button class="quantity-btn" onclick="updateQuantity(1)">+</button>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button class="btn btn-dark btn-lg" 
                                        onclick="addToCart(${product.id})"
                                        ${product.stock < 1 ? 'disabled' : ''}>
                                    <i class="bi bi-cart-plus"></i> 
                                    ${product.stock < 1 ? 'Out of Stock' : 'Add to Cart'}
                                </button>
                                
                                <a href="products.html" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left"></i> Continue Shopping
                                </a>
                            </div>
                            
                            <div class="mt-4 pt-4 border-top">
                                <p class="small text-muted mb-1">
                                    <i class="bi bi-upc-scan"></i> Product ID: VE-${product.id.toString().padStart(4, '0')}
                                </p>
                                <p class="small text-muted mb-1">
                                    <i class="bi bi-shield-exclamation"></i> Goods once sold cannot be returned
                                </p>
                                <p class="small text-muted mb-1">
                                    <i class="bi bi-cash-stack"></i> Payment: M-Pesa / Bank Transfer
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('productContainer').innerHTML = html;
        }

        function changeMainImage(src, index) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.product-thumbnail').forEach((thumb, i) => {
                if (i === index) {
                    thumb.classList.add('active');
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        function openZoom(src) {
            document.getElementById('zoomImage').src = src;
            document.getElementById('zoomModal').classList.add('active');
        }

        function closeZoom() {
            document.getElementById('zoomModal').classList.remove('active');
        }

        function updateQuantity(change) {
            const input = document.getElementById('quantity');
            currentQuantity = parseInt(input.value) + change;
            if (currentQuantity < 1) currentQuantity = 1;
            const product = products.find(p => p.id === productId);
            if (product && currentQuantity > product.stock) {
                currentQuantity = product.stock;
            }
            input.value = currentQuantity;
        }

        function selectColor(element, colorName) {
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('selected'));
            element.classList.add('selected');
            selectedColor = colorName;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const quantity = parseInt(document.getElementById('quantity').value);
            if (!product) return;
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            for (let i = 0; i < quantity; i++) {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    color: selectedColor,
                    image: product.images ? product.images[0] : product.image
                });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(`${quantity} × ${product.name} added to cart!`);
            updateCartCount();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const counts = document.querySelectorAll('#cart-count');
            counts.forEach(el => {
                if (el) el.textContent = cart.length;
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function loadNavbar() {
            fetch('navbar.html')
                .then(r => r.text())
                .then(d => document.getElementById('navbar').innerHTML = d)
                .catch(e => console.log('Navbar error:', e));
        }

        function loadFooter() {
            fetch('footer.html')
                .then(r => r.text())
                .then(d => document.getElementById('footer').innerHTML = d)
                .catch(e => console.log('Footer error:', e));
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeZoom();
        });
    </script>
</body>
</html>
